
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SỨC MẠNH AI - Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body, .font-body, .font-display { 
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
      }
      
      h1, h2, h3, h4, h5, h6, .font-display {
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      @media screen and (max-width: 768px) {
        input, select, textarea, button {
          font-size: 16px !important; /* Ngăn chặn tự động phóng to trên iOS */
        }
      }

      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .checkerboard {
        background-color: #ffffff; 
        background-image:
          linear-gradient(45deg, #f8fafc 25%, transparent 25%),
          linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #f8fafc 75%),
          linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",

    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "marked": "https://aistudiocdn.com/marked@^15.0.6"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 overflow-hidden overscroll-none">

</body>
</html>
